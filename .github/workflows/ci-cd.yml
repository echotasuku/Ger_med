name: CI/CD - Laravel & React

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2123
          MYSQL_DATABASE: ger_est_test
          MYSQL_USER: root
          MYSQL_PASSWORD: 2123
        options: >-
          --health-cmd "mysqladmin ping -p2123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql, mbstring, xml

      - name: Instalar dependências
        run: composer install --no-progress --no-suggest

      - name: Configurar ambiente
        run: |
          cp .env.example .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_DATABASE=ger_est_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=2123" >> .env

      - name: Gerar chave
        run: php artisan key:generate

      - name: Esperar MySQL ficar pronto
        run: sleep 30  # Espera inicial para garantir que o MySQL iniciou

      - name: Rodar migrações
        run: php artisan migrate --force

      - name: Rodar testes
        run: vendor/bin/phpunit

  # ... (mantenha os outros jobs como estão)

  # 🔹 JOB 2: Testes automatizados com Laravel Dusk
  dusk-tests:
    runs-on: ubuntu-latest
    needs: backend-tests  # Só roda Dusk depois que os testes unitários passaram

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2123
          MYSQL_DATABASE: ger_est_test
        options: --health-cmd="mysqladmin ping --silent"
        ports:
          - 3306:3306

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Instalar dependências do Laravel
        run: composer install --no-progress --no-suggest

      - name: Configurar ambiente
        run: cp .env.example .env

      - name: Gerar chave da aplicação
        run: php artisan key:generate

      - name: Rodar migrações
        run: php artisan migrate --force

      - name: Instalar Dusk
        run: php artisan dusk:install

      - name: Rodar testes do Laravel Dusk
        env:
          APP_URL: http://127.0.0.1:8000
        run: php artisan dusk

  # 🔹 JOB 3: Testes no frontend (React)
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '21'

      - name: Instalar dependências do React
        run: npm install
        working-directory: frontend2/germedfrontend  # Ajuste se necessário

      - name: Rodar testes do frontend (Jest)
        run: npm test -- --watchAll=false
        working-directory: frontend2/germedfrontend  # Ajuste se necessário
