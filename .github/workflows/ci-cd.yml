name: CI/CD - Laravel & React

on:
  push:
    branches:
      - dev  # Agora só roda testes quando houver push na dev
  pull_request:
    branches:
      - dev  # Roda os testes antes de integrar qualquer código na dev

jobs:
  # 🔹 JOB 1: Testes no backend (Laravel)
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2123
          MYSQL_DATABASE: ger_est_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
        options: --health-cmd="mysqladmin ping --silent"
        ports:
          - 3306:3306

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Instalar dependências do Laravel
        run: composer install --no-progress --no-suggest

      - name: Configurar ambiente Laravel (.env)
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=mysql" >> .env  # ⬅️ Ajuste para garantir que Laravel encontre o MySQL
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=ger_est_test" >> .env
          echo "DB_USERNAME=laravel" >> .env
          echo "DB_PASSWORD=laravel" >> .env

      - name: Aguardar MySQL iniciar (30s)
        run: sleep 30  # ⬅️ Tempo extra para o MySQL iniciar

      - name: Testar conexão com MySQL antes das migrações
        run: |
          for i in {1..10}; do
            mysql -h mysql -u laravel -plaravel -e "SHOW DATABASES;" && exit 0
            echo "Aguardando MySQL iniciar..."
            sleep 5
          done
          exit 1

      - name: Rodar migrações
        run: php artisan migrate --force

      - name: Rodar testes unitários (PHPUnit)
        run: vendor/bin/phpunit

  # 🔹 JOB 2: Testes automatizados com Laravel Dusk
  dusk-tests:
    runs-on: ubuntu-latest
    needs: backend-tests  # Só roda Dusk depois que os testes unitários passaram

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2123
          MYSQL_DATABASE: ger_est_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
        options: --health-cmd="mysqladmin ping --silent"
        ports:
          - 3306:3306

      chrome:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Instalar dependências do Laravel
        run: composer install --no-progress --no-suggest

      - name: Configurar ambiente Laravel (.env)
        run: |
          cp .env.example .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_DATABASE=ger_est_test" >> .env
          echo "DB_USERNAME=laravel" >> .env
          echo "DB_PASSWORD=laravel" >> .env

      - name: Aguardar MySQL iniciar (30s)
        run: sleep 30

      - name: Testar conexão com MySQL antes das migrações
        run: |
          for i in {1..10}; do
            mysql -h mysql -u laravel -plaravel -e "SHOW DATABASES;" && exit 0
            echo "Aguardando MySQL iniciar..."
            sleep 5
          done
          exit 1

      - name: Rodar migrações
        run: php artisan migrate --force

      - name: Instalar Dusk
        run: php artisan dusk:install

      - name: Ajustar permissões para o Chrome
        run: sudo chmod -R 777 /var/www/vendor/laravel/dusk/bin/

      - name: Iniciar servidor Laravel em background
        run: php artisan serve --host=0.0.0.0 --port=8000 &

      - name: Rodar testes do Laravel Dusk
        env:
          APP_URL: http://localhost:8000
        run: php artisan dusk

  # 🔹 JOB 3: Testes no frontend (React)
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '21'

      - name: Instalar dependências do React
        run: npm install
        working-directory: frontend2/germedfrontend  # Ajuste se necessário

      - name: Rodar testes do frontend (Jest)
        run: npm test -- --watchAll=false
        working-directory: frontend2/germedfrontend  # Ajuste se necessário
